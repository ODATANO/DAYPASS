plugins {
    id 'java'
    id 'application'
}

group = 'dev.daypass'
version = '0.1.0'

java {
    toolchain { languageVersion = JavaLanguageVersion.of(25) }
}

repositories {
    mavenLocal()
    mavenCentral()
    maven { url = uri("https://central.sonatype.com/repository/maven-snapshots") }
}

ext {
    zerojVersion = '0.1.0-pre4'
    julcVersion = '0.1.0-pre14'
    cclVersion = '0.8.0-pre4'
}

dependencies {
    // ZeroJ: circuit DSL, Groth16 prover/setup, Poseidon
    implementation "com.bloxbean.cardano:zeroj-circuit-dsl:${zerojVersion}"
    implementation "com.bloxbean.cardano:zeroj-circuit-lib:${zerojVersion}"
    implementation "com.bloxbean.cardano:zeroj-crypto:${zerojVersion}"
    implementation "com.bloxbean.cardano:zeroj-verifier-groth16:${zerojVersion}"
    implementation "com.bloxbean.cardano:zeroj-onchain-julc:${zerojVersion}"
    annotationProcessor "com.bloxbean.cardano:zeroj-onchain-julc:${zerojVersion}"

    // Julc: on-chain validator compilation (annotation processor emits CIP-57 blueprint)
    implementation "com.bloxbean.cardano:julc-stdlib:${julcVersion}"
    annotationProcessor "com.bloxbean.cardano:julc-annotation-processor:${julcVersion}"
    implementation "com.bloxbean.cardano:julc-cardano-client-lib:${julcVersion}"
    runtimeOnly "com.bloxbean.cardano:julc-vm-java:${julcVersion}"

    // Cardano client lib: PlutusData/PlutusScript types + blake2b
    implementation "com.bloxbean.cardano:cardano-client-lib:${cclVersion}"

    // BLS12-381 point compression natives (Linux/Mac only — run the sidecar in WSL/container)
    implementation 'foundation.icon:blst-java:0.3.2'

    implementation 'com.fasterxml.jackson.core:jackson-databind:2.17.2'
    implementation 'org.slf4j:slf4j-simple:2.0.13'
}

application {
    mainClass = 'dev.daypass.zk.ProverServer'
    // Shared by `gradle run` AND the installDist start script (Docker CMD).
    applicationDefaultJvmArgs = ['--enable-native-access=ALL-UNNAMED', '-Dzeroj.allowInsecureTrustedSetup=true']
}

run {
    workingDir = projectDir
}
